<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Avatar with MediaPipe & Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            text-align: center;
        }#video {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 140px;
        height: 105px;
        border: 2px solid white;
        border-radius: 10px;
        z-index: 10;
    }

    #overlay {
        position: absolute;
        top: 0;
        left: 0;
    }

    .controls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        z-index: 20;
    }

    button {
        padding: 10px 20px;
        margin: 5px;
        border: none;
        border-radius: 8px;
        background: #ff4081;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #e91e63;
    }
</style>

</head>
<body>
    <h2>Interactive Avatar - MediaPipe & Three.js</h2><!-- Webcam Video -->
<video id="video" autoplay playsinline></video>

<!-- Controls -->
<div class="controls">
    <button onclick="throwBall()">Throw Ball</button>
    <button onclick="hitAvatar()">Hit Avatar</button>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    let scene, camera, renderer, avatar;
    let balls = [];
    const videoElement = document.getElementById("video");

    // Initialize Three.js Scene
    function initThreeJS() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 5;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Light
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 5, 5);
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        // Avatar (Simple Robot)
        const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc });

        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), material);
        body.position.y = 0;
        scene.add(body);

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), material);
        head.position.y = 1.2;
        scene.add(head);

        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), material);
        leftArm.position.set(-0.8, 0.3, 0);
        scene.add(leftArm);

        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), material);
        rightArm.position.set(0.8, 0.3, 0);
        scene.add(rightArm);

        avatar = {
            body,
            head,
            leftArm,
            rightArm
        };
    }

    // Initialize MediaPipe Pose
    function initMediaPipe() {
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onPoseResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });

        cameraUtils.start();
    }

    // Map Pose to Avatar
    function onPoseResults(results) {
        if (!results.poseLandmarks) return;

        const landmarks = results.poseLandmarks;

        const leftShoulder = landmarks[11];
        const rightShoulder = landmarks[12];
        const leftWrist = landmarks[15];
        const rightWrist = landmarks[16];

        // Move Arms Based on Wrist Positions
        avatar.leftArm.rotation.z = -(leftWrist.y - leftShoulder.y) * 5;
        avatar.rightArm.rotation.z = -(rightWrist.y - rightShoulder.y) * 5;

        // Move Body Side to Side
        avatar.body.position.x = (leftShoulder.x - 0.5) * 4;
        avatar.head.position.x = avatar.body.position.x;
    }

    // Throw Ball
    function throwBall() {
        const geometry = new THREE.SphereGeometry(0.15, 32, 32);
        const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const ball = new THREE.Mesh(geometry, material);

        ball.position.set(0, 0, 2);
        ball.velocity = new THREE.Vector3(0, 0, -0.2);
        scene.add(ball);
        balls.push(ball);
    }

    // Hit Avatar
    function hitAvatar() {
        avatar.body.material.color.set(0xff0000);
        setTimeout(() => {
            avatar.body.material.color.set(0x00ffcc);
        }, 300);
    }

    // Animate Scene
    function animate() {
        requestAnimationFrame(animate);

        balls.forEach((ball, index) => {
            ball.position.add(ball.velocity);

            // Collision Detection
            if (ball.position.distanceTo(avatar.body.position) < 0.8) {
                hitAvatar();
                scene.remove(ball);
                balls.splice(index, 1);
            }
        });

        renderer.render(scene, camera);
    }

    // Handle Resize
    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start App
    initThreeJS();
    initMediaPipe();
    animate();
</script>

</body>
  </html>

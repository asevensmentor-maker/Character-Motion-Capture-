<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Avatar - MediaPipe, Three.js & Cannon.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            text-align: center;
        }h2 {
        position: absolute;
        top: 10px;
        width: 100%;
        z-index: 5;
        font-size: 18px;
    }

    #video {
        position: absolute;
        top: 60px;
        left: 10px;
        width: 120px;
        border: 2px solid white;
        border-radius: 10px;
        z-index: 10;
    }

    .controls {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        z-index: 20;
    }

    button {
        padding: 12px 18px;
        margin: 5px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(45deg, #ff4081, #ff6f61);
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        opacity: 0.9;
    }
</style>

</head>
<body><h2>Realistic Interactive Avatar</h2>
<video id="video" autoplay playsinline></video><div class="controls">
    <button onclick="throwBall()">Throw Ball</button>
    <button onclick="hitAvatar()">Hit Avatar</button>
</div><!-- Three.js --><script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script><script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script><!-- Cannon.js Physics --><script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script><!-- MediaPipe --><script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script><script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script><script>
let scene, camera, renderer, avatar;
let world, avatarBody;
let balls = [];
const videoElement = document.getElementById("video");

// Initialize Three.js
function initThreeJS() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, 1.5, 4);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 10, 7);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    // Ground
    const groundGeometry = new THREE.PlaneGeometry(10, 10);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Load GLB Avatar
    const loader = new THREE.GLTFLoader();
    loader.load(
        "https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb",
        function (gltf) {
            avatar = gltf.scene;
            avatar.scale.set(1.2, 1.2, 1.2);
            avatar.position.set(0, 0, 0);
            avatar.traverse(obj => {
                if (obj.isMesh) obj.castShadow = true;
            });
            scene.add(avatar);
        },
        undefined,
        function (error) {
            console.error("Error loading GLB model:", error);
        }
    );
}

// Initialize Physics
function initPhysics() {
    world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);

    // Ground Physics
    const groundBody = new CANNON.Body({ mass: 0 });
    const groundShape = new CANNON.Plane();
    groundBody.addShape(groundShape);
    groundBody.quaternion.setFromEuler(-Math.PI / 2, 0, 0);
    world.addBody(groundBody);

    // Avatar Physics
    avatarBody = new CANNON.Body({
        mass: 1,
        shape: new CANNON.Box(new CANNON.Vec3(0.5, 1, 0.5)),
        position: new CANNON.Vec3(0, 1, 0)
    });
    world.addBody(avatarBody);
}

// Initialize MediaPipe Pose
function initMediaPipe() {
    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
    });

    pose.onResults(onPoseResults);

    const cam = new Camera(videoElement, {
        onFrame: async () => {
            await pose.send({ image: videoElement });
        },
        width: 640,
        height: 480
    });

    cam.start();
}

// Map Pose to Avatar
function onPoseResults(results) {
    if (!results.poseLandmarks || !avatar) return;

    const leftShoulder = results.poseLandmarks[11];
    const rightShoulder = results.poseLandmarks[12];

    const centerX = (leftShoulder.x + rightShoulder.x) / 2;

    // Move avatar horizontally
    avatarBody.position.x = (centerX - 0.5) * 4;
}

// Throw Ball
function throwBall() {
    const radius = 0.15;

    // Three.js Mesh
    const geometry = new THREE.SphereGeometry(radius, 32, 32);
    const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = true;
    scene.add(mesh);

    // Cannon.js Body
    const shape = new CANNON.Sphere(radius);
    const body = new CANNON.Body({ mass: 1, shape });
    body.position.set(0, 1.5, 3);
    body.velocity.set(0, 0, -8);
    world.addBody(body);

    balls.push({ mesh, body });
}

// Hit Avatar
function hitAvatar() {
    if (!avatar) return;
    avatar.traverse(child => {
        if (child.isMesh) {
            child.material.emissive = new THREE.Color(0xff0000);
        }
    });

    setTimeout(() => {
        avatar.traverse(child => {
            if (child.isMesh && child.material.emissive) {
                child.material.emissive.set(0x000000);
            }
        });
    }, 200);
}

// Animation Loop
function animate() {
    requestAnimationFrame(animate);

    // Step physics
    world.step(1 / 60);

    // Sync avatar with physics
    if (avatar) {
        avatar.position.copy(avatarBody.position);
    }

    // Update balls
    balls.forEach((ball, index) => {
        ball.mesh.position.copy(ball.body.position);
        ball.mesh.quaternion.copy(ball.body.quaternion);

        // Collision detection
        if (ball.body.position.distanceTo(avatarBody.position) < 1) {
            hitAvatar();
            world.removeBody(ball.body);
            scene.remove(ball.mesh);
            balls.splice(index, 1);
        }
    });

    renderer.render(scene, camera);
}

// Resize Handler
window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize All
initThreeJS();
initPhysics();
initMediaPipe();
animate();
</script></body>
</html>
